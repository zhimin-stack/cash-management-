<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳小管家</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 手動定義 Lucide 圖標組件 (因為 CDN 版使用方式不同)
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const CATEGORIES = {
            food: { label: '餐飲', icon: 'utensils', color: 'bg-orange-500' },
            transport: { label: '交通', icon: 'car', color: 'bg-blue-500' },
            shopping: { label: '購物', icon: 'shopping-bag', color: 'bg-pink-500' },
            housing: { label: '住房', icon: 'home', color: 'bg-indigo-500' },
            entertainment: { label: 'entertainment', icon: 'coffee', color: 'bg-purple-500' },
            other: { label: '其他', icon: 'check-circle-2', color: 'bg-gray-500' },
            income: { label: '收入', icon: 'trending-up', color: 'bg-green-500' }
        };

        const App = () => {
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('my_accounting_data');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [filterType, setFilterType] = useState('all');
            const [formData, setFormData] = useState({
                type: 'expense', amount: '', category: 'food', note: '', date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                localStorage.setItem('my_accounting_data', JSON.stringify(transactions));
            }, [transactions]);

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + Number(t.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + Number(t.amount), 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);

            const categoryStats = useMemo(() => {
                const expensesOnly = transactions.filter(t => t.type === 'expense');
                const totals = {};
                expensesOnly.forEach(t => {
                    totals[t.category] = (totals[t.category] || 0) + Number(t.amount);
                });
                return Object.entries(totals).sort((a, b) => b[1] - a[1]);
            }, [transactions]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.amount) return;
                const newTransaction = { ...formData, id: Date.now(), amount: Number(formData.amount) };
                setTransactions([newTransaction, ...transactions]);
                setIsModalOpen(false);
                setFormData({ type: 'expense', amount: '', category: 'food', note: '', date: new Date().toISOString().split('T')[0] });
            };

            const deleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const filteredTransactions = transactions.filter(t => 
                filterType === 'all' ? true : t.type === filterType
            );

            return (
                <div className="min-h-screen pb-20">
                    {}
                    <header className="bg-white border-b sticky top-0 z-10 px-4 py-4">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <Icon name="wallet" className="text-blue-600" />
                                <span>記帳小管家</span>
                            </h1>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white p-2 rounded-full shadow-lg">
                                <Icon name="plus" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6 space-y-6">
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl">
                            <p className="text-blue-100 text-sm">總餘額</p>
                            <h2 className="text-3xl font-bold mt-1 mb-6">$ {stats.balance.toLocaleString()}</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white/10 rounded-2xl p-3">
                                    <p className="text-xs text-blue-100">本月收入</p>
                                    <p className="font-bold text-lg text-green-400">${stats.income.toLocaleString()}</p>
                                </div>
                                <div className="bg-white/10 rounded-2xl p-3">
                                    <p className="text-xs text-blue-100">本月支出</p>
                                    <p className="font-bold text-lg text-red-400">${stats.expense.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>

                        {}
                        {categoryStats.length > 0 && (
                            <section className="bg-white rounded-2xl p-5 shadow-sm">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-gray-700">
                                    <Icon name="pie-chart" size={18} /> 支出比例分析
                                </h3>
                                <div className="space-y-3">
                                    {categoryStats.map(([cat, amount]) => {
                                        const percentage = ((amount / stats.expense) * 100).toFixed(1);
                                        const info = CATEGORIES[cat] || CATEGORIES.other;
                                        return (
                                            <div key={cat} className="space-y-1">
                                                <div className="flex justify-between text-sm text-gray-600">
                                                    <span>{info.label}</span>
                                                    <span>{percentage}%</span>
                                                </div>
                                                <div className="w-full bg-gray-100 h-2 rounded-full">
                                                    <div className={`${info.color} h-full rounded-full`} style={{ width: `${percentage}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        )}

                        {}
                        <section className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h3 className="font-bold text-lg">紀錄明細</h3>
                                <div className="flex bg-gray-200 p-1 rounded-lg text-xs">
                                    {['all', 'expense', 'income'].map(type => (
                                        <button key={type} onClick={() => setFilterType(type)} className={`px-3 py-1 rounded-md ${filterType === type ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>
                                            {type === 'all' ? '全部' : type === 'expense' ? '支出' : '收入'}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-3">
                                {filteredTransactions.length > 0 ? filteredTransactions.map(t => (
                                    <div key={t.id} className="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm">
                                        <div className={`${(CATEGORIES[t.category] || CATEGORIES.other).color} p-3 rounded-xl text-white`}>
                                            <Icon name={(CATEGORIES[t.category] || CATEGORIES.other).icon} />
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between font-semibold">
                                                <span>{t.note || (CATEGORIES[t.category] || CATEGORIES.other).label}</span>
                                                <span className={t.type === 'income' ? 'text-green-600' : 'text-red-600'}>
                                                    {t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}
                                                </span>
                                            </div>
                                            <div className="text-xs text-gray-400 mt-1 flex justify-between">
                                                <span>{t.date}</span>
                                                <button onClick={() => deleteTransaction(t.id)} className="text-gray-300 hover:text-red-500">
                                                    <Icon name="trash-2" size={14} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="text-center py-10 text-gray-400 bg-white rounded-2xl border border-dashed">尚無資料</div>
                                )}
                            </div>
                        </section>
                    </main>

                    {}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl p-6 relative z-10 animate-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">新增記帳</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-gray-100 rounded-full">
                                        <Icon name="x" className="text-gray-500" />
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="flex p-1 bg-gray-100 rounded-xl">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-2 rounded-lg font-medium transition ${formData.type === 'expense' ? 'bg-red-500 text-white shadow' : 'text-gray-500'}`}>支出</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: 'income'})} className={`flex-1 py-2 rounded-lg font-medium transition ${formData.type === 'income' ? 'bg-green-500 text-white shadow' : 'text-gray-500'}`}>收入</button>
                                    </div>
                                    <input type="number" placeholder="金額" required value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full bg-gray-50 border-none rounded-2xl py-4 px-4 text-2xl font-bold focus:ring-2 focus:ring-blue-500" />
                                    {formData.type === 'expense' && (
                                        <div className="grid grid-cols-3 gap-2">
                                            {Object.entries(CATEGORIES).filter(([k]) => k !== 'income').map(([key, info]) => (
                                                <button key={key} type="button" onClick={() => setFormData({...formData, category: key})} className={`flex flex-col items-center gap-1 p-3 rounded-2xl border-2 transition ${formData.category === key ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-transparent bg-gray-50 text-gray-500'}`}>
                                                    <Icon name={info.icon} size={20} />
                                                    <span className="text-xs">{info.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="bg-gray-50 rounded-xl p-3 text-sm border-none" />
                                        <input type="text" placeholder="備註..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} className="bg-gray-50 rounded-xl p-3 text-sm border-none" />
                                    </div>
                                    <button type="submit" className={`w-full py-4 rounded-2xl font-bold text-white shadow-xl ${formData.type === 'income' ? 'bg-green-600' : 'bg-red-600'}`}>儲存</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
