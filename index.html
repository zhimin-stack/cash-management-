<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========================================== -->
    <!-- 網頁標籤圖標 (Favicon) 設定                -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" href="./favicon.png">
    
    <!-- Apple iOS 加入主畫面圖標設定 -->
    <link rel="apple-touch-icon" href="./favicon.png">
    <meta name="apple-mobile-web-app-title" content="森林記帳">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ========================================== -->
    <!-- 社群分享縮圖 (Open Graph & Twitter Cards)  -->
    <!-- ========================================== -->
    <title>森林記帳小筆記 - 森林裡的每一分收穫與落葉</title>
    <meta name="description" content="充滿吉卜力繪本風格的專屬記帳本，紀錄你每一天的生活足跡。">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://您的github帳號.github.io/專案名稱/">
    <meta property="og:title" content="森林記帳小筆記 - 專屬森林帳本">
    <meta property="og:description" content="充滿吉卜力繪本風格的專屬記帳本，紀錄你每一天的生活足跡。">
    <meta property="og:image" content="./og-image.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://您的github帳號.github.io/專案名稱/">
    <meta property="twitter:title" content="森林記帳小筆記 - 專屬森林帳本">
    <meta property="twitter:description" content="充滿吉卜力繪本風格的專屬記帳本，紀錄你每一天的生活足跡。">
    <meta property="twitter:image" content="./og-image.png">
    <!-- ========================================== -->

    <!-- 引入外部資源 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --forest-green: #4A6741;
            --sky-blue: #87CEEB;
            --oak-brown: #D4A373;
            --parchment: #FDFBF7;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F9F6F0;
            background-image: radial-gradient(#E8DCC4 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            color: #5D4037;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .ghibli-card {
            background: var(--parchment);
            border: 2px solid #E8DCC4;
            border-bottom-width: 6px;
            border-right-width: 4px;
            border-radius: 2.5rem;
            box-shadow: 10px 10px 0px rgba(74, 103, 65, 0.05);
        }

        .forest-gradient {
            background: linear-gradient(135deg, #4A6741 0%, #5D7A52 50%, #3E5638 100%);
            border: 4px solid rgba(245, 245, 220, 0.15);
        }

        .leaf-float {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            animation: float-down 15s linear infinite;
        }

        @keyframes float-down {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(20px); opacity: 0; }
        }

        /* 刪除模式抖動動畫 */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        .wiggle-animation { animation: wiggle 0.3s ease-in-out infinite; }
        .prevent-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-press:active { transform: scale(0.92); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-active {
            background: var(--forest-green);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(74, 103, 65, 0.3);
            transform: scale(1.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E8DCC4; border-radius: 10px; }
        
        input { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', iconName);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': 2.5, 'width': size, 'height': size, 'class': className }
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }} />;
        };

        const INITIAL_CATEGORIES = {
            'food': { label: '晨間食事', icon: 'Coffee', color: 'bg-[#D4A373]', isCustom: false },
            'meal': { label: '豐盛餐飲', icon: 'Utensils', color: 'bg-[#4A6741]', isCustom: false },
            'transport': { label: '林間穿梭', icon: 'Bus', color: 'bg-[#87CEEB]', isCustom: false },
            'shopping': { label: '生活收穫', icon: 'ShoppingBag', color: 'bg-[#BC6C25]', isCustom: false },
            'play': { label: '閒暇時光', icon: 'Gamepad2', color: 'bg-[#CCD5AE]', isCustom: false },
            'home': { label: '避風港灣', icon: 'Home', color: 'bg-[#FAEDCD]', isCustom: false },
            'medical': { label: '草藥護理', icon: 'Heart', color: 'bg-[#E5989B]', isCustom: false },
            'income': { label: '辛勤獲取', icon: 'Sprout', color: 'bg-[#4A6741]', isIncome: true, isCustom: false }
        };

        // 自訂圖示池與顏色池
        const CUSTOM_ICONS = ['Coffee', 'Utensils', 'Bus', 'ShoppingBag', 'Gamepad2', 'Heart', 'Sprout', 'Trees', 'Cloud', 'Gift', 'Car', 'Smartphone', 'Star', 'Music', 'Book', 'Wrench'];
        const CUSTOM_COLORS = ['bg-[#4A6741]', 'bg-[#87CEEB]', 'bg-[#D4A373]', 'bg-[#E9EDC9]', 'bg-[#E5989B]', 'bg-[#BC6C25]', 'bg-[#A3B18A]', 'bg-[#6D6875]'];

        const FloatingLeaves = () => {
            return (
                <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                    {[...Array(10)].map((_, i) => (
                        <div key={i} className="leaf-float" style={{ 
                            left: `${Math.random() * 100}%`, 
                            animationDelay: `${Math.random() * 15}s`, 
                            animationDuration: `${10 + Math.random() * 10}s` 
                        }}>
                            <Icon name="Leaf" size={24} className="text-[#4A6741]" />
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('wallet');
            const [forestName, setForestName] = useState(() => localStorage.getItem('forest_name') || '我的秘密森林');
            
            // 預算處理：修復刪除變成0的問題
            const [budget, setBudget] = useState(() => {
                const saved = localStorage.getItem('forest_budget');
                if (saved === null) return 15000;
                if (saved === '') return '';
                return Number(saved);
            });
            
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('ghibli_accounting_data');
                return saved ? JSON.parse(saved) : [];
            });
            
            // 類別狀態
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('forest_categories');
                return saved ? JSON.parse(saved) : INITIAL_CATEGORIES;
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSettingOpen, setIsSettingOpen] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [formData, setFormData] = useState({
                type: 'expense', amount: '', category: 'food', note: '', date: new Date().toISOString().split('T')[0]
            });

            // 自訂分類與長按刪除相關狀態
            const [isAddCategoryOpen, setIsAddCategoryOpen] = useState(false);
            const [newCategory, setNewCategory] = useState({ label: '', icon: 'Leaf', color: 'bg-[#4A6741]' });
            const [isDeleteMode, setIsDeleteMode] = useState(false);
            const pressTimer = useRef(null);

            useEffect(() => {
                localStorage.setItem('ghibli_accounting_data', JSON.stringify(transactions));
                localStorage.setItem('forest_name', forestName);
                localStorage.setItem('forest_budget', budget);
                localStorage.setItem('forest_categories', JSON.stringify(categories));
            }, [transactions, forestName, budget, categories]);

            const getDaysInMonth = (dateStr) => {
                const [year, month] = dateStr.split('-');
                return new Date(year, month, 0).getDate();
            };
            const daysInSelectedMonth = getDaysInMonth(selectedDate);
            const selectedYearMonth = selectedDate.substring(0, 7);

            const stats = useMemo(() => {
                const now = new Date();
                const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const monthlyData = transactions.filter(t => t.date.startsWith(thisMonth));
                const income = monthlyData.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
                const expense = monthlyData.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
                const catStats = {};
                monthlyData.filter(t => t.type === 'expense').forEach(t => {
                    catStats[t.category] = (catStats[t.category] || 0) + Number(t.amount);
                });
                return {
                    income, expense, balance: income - expense,
                    budgetUsed: budget ? Math.min(100, (expense / budget * 100)).toFixed(1) : 0,
                    catStats: Object.entries(catStats).sort((a,b) => b[1] - a[1])
                };
            }, [transactions, budget]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.amount || formData.amount <= 0) return;
                setTransactions([{ ...formData, id: Date.now(), amount: Number(formData.amount) }, ...transactions]);
                setIsModalOpen(false);
                setFormData({ ...formData, amount: '', note: '' });
                setIsDeleteMode(false);
            };

            const exportCSV = () => {
                let csv = "日期,類型,類別,金額,備註\n";
                transactions.forEach(t => {
                    csv += `${t.date},${t.type === 'income' ? '收穫' : '落葉'},${categories[t.category]?.label || '其他'},${t.amount},${t.note}\n`;
                });
                const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `森林帳本_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            // 處理長按事件
            const handlePressStart = () => {
                pressTimer.current = setTimeout(() => {
                    setIsDeleteMode(true);
                }, 600); // 長按 600ms 觸發
            };
            const handlePressEnd = () => {
                if (pressTimer.current) clearTimeout(pressTimer.current);
            };

            // 新增自訂分類
            const handleAddCategory = () => {
                if (!newCategory.label.trim()) return;
                const newKey = `custom_${Date.now()}`;
                setCategories(prev => ({
                    ...prev,
                    [newKey]: { ...newCategory, isCustom: true, isIncome: formData.type === 'income' }
                }));
                setIsAddCategoryOpen(false);
                setNewCategory({ label: '', icon: 'Leaf', color: 'bg-[#4A6741]' });
            };

            // 刪除自訂分類
            const handleDeleteCategory = (keyToRemove, e) => {
                e.stopPropagation();
                setCategories(prev => {
                    const newCats = { ...prev };
                    delete newCats[keyToRemove];
                    return newCats;
                });
                if (formData.category === keyToRemove) {
                    // 如果刪除的是目前選中的，就跳回第一個可用的
                    const firstAvailable = Object.entries(categories).find(([k, v]) => k !== keyToRemove && v.isIncome === (formData.type === 'income'));
                    if (firstAvailable) setFormData(f => ({ ...f, category: firstAvailable[0] }));
                }
            };

            return (
                <div className="relative min-h-screen pb-32 z-10">
                    <FloatingLeaves />
                    
                    <header className="max-w-2xl mx-auto px-6 pt-8 pb-4 flex justify-between items-center relative z-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-[#4A6741] p-3 rounded-[1.8rem] text-white shadow-xl rotate-[-3deg]"><Icon name="Trees" size={32} /></div>
                            <div>
                                <h1 className="text-xl font-black text-[#4A6741] flex items-center gap-1">
                                    {forestName}
                                    <Icon name="Sparkles" size={14} className="text-[#D4A373] animate-pulse" />
                                </h1>
                                <p className="text-[10px] font-bold text-[#A69076] uppercase tracking-wider">Ghibli Forest Notebook</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsSettingOpen(true)} className="p-3 bg-white border-2 border-[#E8DCC4] rounded-2xl text-[#8B7355] btn-press shadow-sm"><Icon name="Settings" size={22} /></button>
                            <button onClick={() => setIsModalOpen(true)} className="p-3 bg-[#4A6741] text-white rounded-2xl btn-press shadow-lg shadow-emerald-200"><Icon name="Plus" size={26} /></button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 relative z-10">
                        {/* ===================== 首頁: 森林錢包 ===================== */}
                        {activeTab === 'wallet' && (
                            <div className="animate-pop space-y-8 pt-4">
                                <div className="ghibli-card forest-gradient p-8 sm:p-10 text-white overflow-hidden shadow-2xl">
                                    <div className="absolute top-2 right-4 opacity-10"><Icon name="Cloud" size={120} /></div>
                                    <p className="text-emerald-100 text-xs font-bold tracking-widest flex items-center gap-2 mb-2"><Icon name="Wallet" size={14} /> 森林目前餘額</p>
                                    <h2 className="text-4xl font-black mb-10 tracking-tight">$ {stats.balance.toLocaleString()}</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/10 backdrop-blur-md rounded-[1.8rem] p-4 border border-white/20">
                                            <p className="text-[10px] font-bold text-emerald-100 uppercase mb-1">本月收穫 (收入)</p>
                                            <p className="text-xl font-bold">+ {stats.income.toLocaleString()}</p>
                                        </div>
                                        <div className="bg-white/10 backdrop-blur-md rounded-[1.8rem] p-4 border border-white/20">
                                            <p className="text-[10px] font-bold text-orange-100 uppercase mb-1">本月落葉 (支出)</p>
                                            <p className="text-xl font-bold">- {stats.expense.toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="mt-8 space-y-2">
                                        <div className="flex justify-between text-[11px] font-black">
                                            <span className="flex items-center gap-1.5"><Icon name="Activity" size={12} /> 預算進度</span>
                                            <span>{stats.budgetUsed}%</span>
                                        </div>
                                        <div className="w-full bg-black/20 h-4 rounded-full p-[3px] shadow-inner">
                                            <div className={`h-full rounded-full transition-all duration-1000 ${Number(stats.budgetUsed) > 90 ? 'bg-orange-400' : 'bg-emerald-300'}`} style={{ width: `${stats.budgetUsed}%` }}></div>
                                        </div>
                                    </div>
                                </div>

                                <section className="space-y-4">
                                    <h3 className="font-bold text-lg flex items-center gap-2.5 text-[#4A6741]"><Icon name="ScrollText" size={24} /> 最近的足跡</h3>
                                    <div className="space-y-4 pb-12">
                                        {transactions.slice(0, 10).map(t => {
                                            const info = categories[t.category] || { label: '其他', icon: 'Leaf', color: 'bg-gray-400' };
                                            return (
                                                <div key={t.id} className="ghibli-card p-5 flex items-center gap-4 sm:gap-5 group active:scale-98 transition-all">
                                                    <div className={`${info.color} p-4 rounded-2xl text-white shadow-md`}><Icon name={info.icon} size={24} /></div>
                                                    <div className="flex-1">
                                                        <div className="flex justify-between font-bold">
                                                            <span className="text-md text-[#5D4037]">{t.note || info.label}</span>
                                                            <span className={t.type === 'income' ? 'text-emerald-600' : 'text-orange-700'}>${t.amount.toLocaleString()}</span>
                                                        </div>
                                                        <div className="flex justify-between items-center mt-2 text-[10px] font-bold text-[#A69076]">
                                                            <span className="bg-[#F5F5DC] px-2 py-0.5 rounded-full">{t.date}</span>
                                                            <button onClick={() => setTransactions(transactions.filter(x => x.id !== t.id))} className="text-red-300 p-1 active:scale-90"><Icon name="Trash2" size={16} /></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {transactions.length === 0 && <div className="text-center py-24 opacity-50 italic font-bold">森林安靜地等待著故事...</div>}
                                    </div>
                                </section>
                            </div>
                        )}

                        {/* ===================== 分析: 分類比例 ===================== */}
                        {activeTab === 'stats' && (
                            <div className="animate-pop space-y-6 pt-4">
                                <div className="ghibli-card p-8">
                                    <h3 className="text-xl font-bold mb-8 flex items-center gap-2.5 text-[#4A6741]"><Icon name="PieChart" size={24} /> 森林分析 (本月)</h3>
                                    <div className="space-y-6">
                                        {stats.catStats.map(([cat, amount]) => {
                                            const info = categories[cat] || { label: '其他', color: 'bg-gray-300', icon: 'Leaf' };
                                            const percent = (amount / (stats.expense || 1) * 100).toFixed(1);
                                            return (
                                                <div key={cat} className="space-y-2">
                                                    <div className="flex justify-between text-xs font-bold text-[#8B7355]">
                                                        <div className="flex items-center gap-2"><Icon name={info.icon} size={14} />{info.label}</div>
                                                        <span>{percent}% (${amount.toLocaleString()})</span>
                                                    </div>
                                                    <div className="w-full bg-[#F0EAD6] h-4 rounded-full p-[2px] shadow-inner">
                                                        <div className={`${info.color} h-full rounded-full`} style={{ width: `${percent}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {stats.catStats.length === 0 && <p className="text-center py-20 opacity-50 font-bold italic">目前森林裡還沒有落葉 (支出)...</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===================== 日曆: 時光森林 ===================== */}
                        {activeTab === 'calendar' && (
                            <div className="animate-pop space-y-6 pt-4 pb-12">
                                <div className="ghibli-card p-6 sm:p-8 text-center relative overflow-hidden">
                                    <div className="absolute top-2 left-2 opacity-20"><Icon name="Cloud" size={60} /></div>
                                    <h3 className="text-xl font-bold mb-6 text-[#5D4037] flex items-center justify-center gap-2">
                                        <Icon name="CalendarDays" className="text-[#87CEEB]" /> 時光森林
                                    </h3>
                                    <div className="text-xs font-black bg-[#E9EDC9] px-4 py-2 rounded-full border-2 border-[#CCD5AE] text-[#4A6741] inline-block mb-6">
                                        {selectedDate.substring(0, 4)}年 {selectedDate.substring(5, 7)}月
                                    </div>
                                    <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
                                        {['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-[10px] font-black text-[#D1C4B0] pb-2">{d}</div>)}
                                        {Array.from({ length: daysInSelectedMonth }, (_, i) => {
                                            const day = i + 1;
                                            const dStr = `${selectedYearMonth}-${String(day).padStart(2, '0')}`;
                                            const dayLogs = transactions.filter(t => t.date === dStr);
                                            const isSelected = selectedDate === dStr;
                                            
                                            const hasExpense = dayLogs.some(t => t.type === 'expense');
                                            const hasIncome = dayLogs.some(t => t.type === 'income');

                                            return (
                                                <button 
                                                    key={day} 
                                                    onClick={() => setSelectedDate(dStr)}
                                                    className={`aspect-square flex flex-col items-center justify-center rounded-2xl transition-all border-2 relative ${isSelected ? 'border-[#4A6741] bg-[#FEFAE0] scale-110 shadow-md z-10' : 'border-transparent hover:bg-white/50'}`}
                                                >
                                                    <span className={`text-[12px] sm:text-[14px] font-black ${dayLogs.length > 0 ? 'text-[#BC6C25]' : 'text-[#A69076]'}`}>{day}</span>
                                                    <div className="flex gap-1 mt-1">
                                                        {hasExpense && <div className="w-1.5 h-1.5 bg-orange-400 rounded-full"></div>}
                                                        {hasIncome && <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full"></div>}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 日曆選中日期的詳細紀錄 */}
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between px-3">
                                        <div className="flex items-center gap-2 text-[#8B7355] font-black text-sm">
                                            <Icon name="MapPin" size={16} /> {selectedDate} 的足跡
                                        </div>
                                        <div className="text-[10px] font-bold text-[#D1C4B0]">總共 {transactions.filter(t => t.date === selectedDate).length} 筆</div>
                                    </div>
                                    
                                    {transactions.filter(t => t.date === selectedDate).map(t => {
                                        const info = categories[t.category] || { label: '其他', color: 'bg-gray-400', icon: 'Leaf' };
                                        return (
                                            <div key={t.id} className="bg-white/80 border-2 border-[#E8DCC4] p-5 rounded-[2rem] flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-4">
                                                    <div className={`${info.color} p-3 rounded-xl text-white shadow-sm`}><Icon name={info.icon} size={20} /></div>
                                                    <span className="font-bold text-[#5D4037]">{t.note || info.label}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className={`font-black text-lg ${t.type === 'income' ? 'text-emerald-600' : 'text-orange-700'}`}>
                                                        {t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}
                                                    </span>
                                                    <button onClick={() => setTransactions(transactions.filter(x => x.id !== t.id))} className="text-red-300 hover:text-red-500 p-1 active:scale-90 transition-all">
                                                        <Icon name="Trash2" size={18} />
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    {transactions.filter(t => t.date === selectedDate).length === 0 && (
                                        <div className="ghibli-card p-8 border-dashed bg-transparent text-center shadow-none">
                                            <Icon name="Wind" size={32} className="text-[#D1C4B0] mb-2 mx-auto" />
                                            <p className="text-xs italic text-[#D1C4B0] font-bold">這一天，森林裡只有寧靜...</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-0 right-0 px-6 z-50">
                        <div className="max-w-xs mx-auto bg-white/95 backdrop-blur-xl border-2 border-[#E8DCC4] rounded-[3rem] p-2 flex justify-between shadow-2xl ring-12 ring-[#F9F6F0]/90">
                            <button onClick={() => setActiveTab('wallet')} className={`flex-1 flex flex-col items-center py-4 rounded-[2.5rem] transition-all ${activeTab === 'wallet' ? 'bg-[#4A6741] text-white' : 'text-[#D1C4B0]'}`}>
                                <Icon name="Wallet" /><span className="text-[10px] font-black mt-1">首頁</span>
                            </button>
                            <button onClick={() => setActiveTab('stats')} className={`flex-1 flex flex-col items-center py-4 rounded-[2.5rem] transition-all ${activeTab === 'stats' ? 'bg-[#4A6741] text-white' : 'text-[#D1C4B0]'}`}>
                                <Icon name="PieChart" /><span className="text-[10px] font-black mt-1">分析</span>
                            </button>
                            <button onClick={() => setActiveTab('calendar')} className={`flex-1 flex flex-col items-center py-4 rounded-[2.5rem] transition-all ${activeTab === 'calendar' ? 'bg-[#4A6741] text-white' : 'text-[#D1C4B0]'}`}>
                                <Icon name="Calendar" /><span className="text-[10px] font-black mt-1">日曆</span>
                            </button>
                        </div>
                    </nav>

                    {/* ===================== 新增紀錄彈窗 ===================== */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-end justify-center">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => { setIsModalOpen(false); setIsDeleteMode(false); }}></div>
                            <div className="bg-[#FDFBF7] w-full max-w-lg rounded-t-[3rem] sm:rounded-t-[4rem] p-6 sm:p-10 relative z-10 border-t-8 border-[#4A6741] shadow-2xl animate-pop max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-[#5D4037] flex items-center gap-2.5">
                                        <Icon name="PenTool" className="text-emerald-600" /> 紀錄瞬間
                                    </h2>
                                    <div className="flex items-center gap-2">
                                        {/* 如果在刪除模式，顯示完成按鈕 */}
                                        {isDeleteMode && (
                                            <button onClick={() => setIsDeleteMode(false)} className="px-4 py-2 bg-rose-100 text-rose-700 rounded-full font-bold text-xs btn-press">
                                                完成刪除
                                            </button>
                                        )}
                                        <button onClick={() => { setIsModalOpen(false); setIsDeleteMode(false); }} className="p-2.5 bg-[#F5F5DC] rounded-full text-[#A69076] btn-press">
                                            <Icon name="X" size={24} />
                                        </button>
                                    </div>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    {/* 收支切換 */}
                                    <div className="flex bg-[#F0EAD6] p-1.5 rounded-[2.5rem] border-2 border-[#E8DCC4] gap-2">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense', category: 'food'})} className={`flex-1 py-3.5 rounded-[2rem] font-black transition-all ${formData.type === 'expense' ? 'bg-[#BC6C25] text-white shadow-md' : 'text-[#A69076]'}`}>支出</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: 'income'})} className={`flex-1 py-3.5 rounded-[2rem] font-black transition-all ${formData.type === 'income' ? 'bg-[#4A6741] text-white shadow-md' : 'text-[#A69076]'}`}>收入</button>
                                    </div>
                                    
                                    {/* 金額輸入 */}
                                    <div className="relative group">
                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-[#D1C4B0]">$</span>
                                        <input type="number" required placeholder="0" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full bg-white border-4 border-[#F5F5DC] rounded-[2rem] py-6 pl-14 text-3xl font-black focus:outline-none shadow-inner" />
                                    </div>
                                    
                                    {/* 分類標籤區 */}
                                    <div>
                                        <p className="text-xs font-bold text-[#A69076] mb-3 ml-2 flex items-center justify-between">
                                            <span><Icon name="Tag" size={14} className="inline mr-1" /> 挑選分類 (長按可刪除自訂項目)</span>
                                        </p>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-3">
                                            {Object.entries(categories).filter(([_, info]) => formData.type === 'income' ? info.isIncome : !info.isIncome).map(([key, info]) => (
                                                <div key={key} className="relative">
                                                    <button 
                                                        type="button" 
                                                        onMouseDown={handlePressStart}
                                                        onMouseUp={handlePressEnd}
                                                        onMouseLeave={handlePressEnd}
                                                        onTouchStart={handlePressStart}
                                                        onTouchEnd={handlePressEnd}
                                                        onClick={() => {
                                                            if (!isDeleteMode) setFormData({...formData, category: key});
                                                        }} 
                                                        className={`w-full flex flex-col items-center justify-center p-3 rounded-[1.5rem] border-4 transition-all prevent-select ${formData.category === key && !isDeleteMode ? 'border-[#4A6741] bg-[#E9EDC9]' : 'border-transparent bg-white shadow-sm'} ${isDeleteMode ? 'wiggle-animation' : 'btn-press'}`}
                                                    >
                                                        <div className={`${info.color} p-3 rounded-xl text-white shadow-sm mb-2`}><Icon name={info.icon} size={24} /></div>
                                                        <span className="text-[12px] font-black leading-tight text-center whitespace-normal break-words">{info.label}</span>
                                                    </button>
                                                    
                                                    {/* 刪除按鈕標籤 (僅自訂類別可刪除) */}
                                                    {isDeleteMode && info.isCustom && (
                                                        <button 
                                                            type="button"
                                                            onClick={(e) => handleDeleteCategory(key, e)}
                                                            className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1.5 shadow-lg border-2 border-white z-10"
                                                        >
                                                            <Icon name="X" size={12} />
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            {/* 新增自訂按鈕 */}
                                            {!isDeleteMode && (
                                                <button 
                                                    type="button" 
                                                    onClick={() => setIsAddCategoryOpen(true)} 
                                                    className="flex flex-col items-center justify-center p-3 rounded-[1.5rem] border-4 border-dashed border-[#D1C4B0] bg-transparent transition-all btn-press opacity-70 hover:opacity-100"
                                                >
                                                    <div className="bg-[#E8DCC4] p-3 rounded-xl text-[#8B7355] shadow-sm mb-2"><Icon name="Plus" size={24} /></div>
                                                    <span className="text-[12px] font-black leading-tight text-center whitespace-normal break-words text-[#8B7355]">自訂</span>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    
                                    {/* 日期與備註 */}
                                    <div className="grid grid-cols-1 gap-3">
                                        <div className="bg-white border-2 border-[#F5F5DC] rounded-2xl p-4 flex items-center gap-4 shadow-sm"><Icon name="Calendar" size={20} className="text-[#A69076]" /><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="flex-1 font-bold text-sm focus:outline-none bg-transparent" /></div>
                                        <div className="bg-white border-2 border-[#F5F5DC] rounded-2xl p-4 flex items-center gap-4 shadow-sm"><Icon name="Pen" size={20} className="text-[#A69076]" /><input type="text" placeholder="備註..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} className="flex-1 font-bold text-sm focus:outline-none bg-transparent" /></div>
                                    </div>
                                    
                                    <button type="submit" className={`w-full py-5 rounded-[2rem] font-black text-xl text-white shadow-xl btn-press ${formData.type === 'income' ? 'bg-[#4A6741]' : 'bg-[#BC6C25]'}`}>保存森林回憶</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ===================== 新增自訂分類精靈 ===================== */}
                    {isAddCategoryOpen && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => setIsAddCategoryOpen(false)}></div>
                            <div className="bg-[#FDFBF7] w-full max-w-sm rounded-[3rem] p-8 relative z-10 border-b-8 border-[#4A6741] shadow-2xl animate-pop">
                                <h2 className="text-xl font-black mb-6 flex items-center gap-2 text-[#5D4037]">
                                    <Icon name="PlusCircle" /> 新增專屬分類
                                </h2>
                                
                                <div className="space-y-6">
                                    {/* 名稱 */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-[#A69076]">標籤名稱</label>
                                        <input type="text" placeholder="例如：飲料、寵物..." value={newCategory.label} onChange={e => setNewCategory({...newCategory, label: e.target.value})} className="w-full bg-white border-4 border-[#F5F5DC] rounded-2xl p-4 font-black focus:outline-none focus:border-[#4A6741]" />
                                    </div>
                                    
                                    {/* 圖示選擇 */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-[#A69076]">代表圖案</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {CUSTOM_ICONS.map(icon => (
                                                <button key={icon} onClick={() => setNewCategory({...newCategory, icon})} className={`p-3 rounded-xl flex items-center justify-center transition-all ${newCategory.icon === icon ? 'bg-[#4A6741] text-white shadow-md' : 'bg-white text-[#A69076] border-2 border-[#F5F5DC]'}`}>
                                                    <Icon name={icon} size={20} />
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* 顏色選擇 */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-[#A69076]">專屬顏色</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {CUSTOM_COLORS.map(color => (
                                                <button key={color} onClick={() => setNewCategory({...newCategory, color})} className={`h-10 rounded-xl transition-all ${color} ${newCategory.color === color ? 'ring-4 ring-[#E8DCC4] scale-110' : 'opacity-80'}`}></button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="pt-2 flex gap-3">
                                        <button onClick={() => setIsAddCategoryOpen(false)} className="flex-1 py-4 bg-[#F5F5DC] text-[#A69076] rounded-2xl font-black btn-press">取消</button>
                                        <button onClick={handleAddCategory} disabled={!newCategory.label.trim()} className="flex-1 py-4 bg-[#4A6741] text-white rounded-2xl font-black shadow-md btn-press disabled:opacity-50 disabled:active:scale-100">確認新增</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===================== 設定彈窗 ===================== */}
                    {isSettingOpen && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setIsSettingOpen(false)}></div>
                            <div className="bg-[#FDFBF7] w-full max-w-md rounded-[3rem] p-8 sm:p-10 relative z-10 border-b-8 border-[#D4A373] shadow-2xl animate-pop">
                                <h2 className="text-xl font-black mb-6 flex items-center gap-3"><Icon name="Settings" /> 森林維護</h2>
                                <div className="space-y-5">
                                    <div className="space-y-2"><label className="text-xs font-black text-[#A69076]">森林名稱</label><input type="text" value={forestName} onChange={e => setForestName(e.target.value)} className="w-full bg-white border-4 border-[#F5F5DC] rounded-[1.8rem] p-4 font-black focus:outline-none focus:border-[#4A6741]" /></div>
                                    <div className="space-y-2"><label className="text-xs font-black text-[#A69076]">本月預算</label><input type="number" value={budget} onChange={e => setBudget(e.target.value === '' ? '' : Number(e.target.value))} className="w-full bg-white border-4 border-[#F5F5DC] rounded-[1.8rem] p-4 font-black focus:outline-none focus:border-[#4A6741]" /></div>
                                    <button onClick={exportCSV} className="w-full py-4 mt-2 bg-white border-2 border-emerald-100 text-[#4A6741] rounded-[1.8rem] font-black flex items-center justify-center gap-2 btn-press"><Icon name="FileSpreadsheet" size={18} /> 匯出帳本 (CSV)</button>
                                    <button onClick={() => setIsSettingOpen(false)} className="w-full py-4 bg-[#4A6741] text-white rounded-[2rem] font-black text-lg shadow-xl btn-press">保存設定</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
